<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief Donation Optimizer - Humanitarian Access</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="relief-bg">
            <div class="wave-animation"></div>
            <div class="grid-overlay"></div>
        </div>
        
        <div class="login-container">
            <div class="logo-section">
                <div class="logo">
                    <i class="fas fa-hands-helping"></i>
                    <h1>Hope Bridge</h1>
                </div>
                <p class="tagline">Disaster Relief Donation Platform</p>
            </div>

            <div class="form-container">
                <div class="form-tabs">
                    <button class="tab-btn active" data-tab="signin">
                        <i class="fas fa-sign-in-alt"></i>
                        Sign In
                    </button>
                    <button class="tab-btn" data-tab="signup">
                        <i class="fas fa-user-plus"></i>
                        Sign Up
                    </button>
                </div>

                <!-- Sign In Form -->
                <form class="auth-form active" id="signin-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signin-username" placeholder="Username or Email" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signin-password" placeholder="Password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('signin-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember-me">
                            <span class="checkmark"></span>
                            <i class="fas fa-check-circle"></i>
                            Remember me
                        </label>
                        <a href="#" class="forgot-password">
                            <i class="fas fa-key"></i>
                            Forgot Password?
                        </a>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-sign-in-alt"></i>
                        Access Relief Platform
                    </button>

                    <div class="relief-indicators">
                        <div class="relief-item">
                            <i class="fas fa-heart"></i>
                            <span>Humanitarian Focus</span>
                        </div>
                        <div class="relief-item">
                            <i class="fas fa-globe"></i>
                            <span>Global Impact</span>
                        </div>
                    </div>
                </form>

                <!-- Sign Up Form -->
                <form class="auth-form" id="signup-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signup-username" placeholder="Username" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signup-email" placeholder="Email Address" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-password" placeholder="Password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('signup-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-confirm-password" placeholder="Confirm Password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('signup-confirm-password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <span class="strength-text" id="strength-text">Password Strength</span>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" id="terms-agreement" required>
                            <span class="checkmark"></span>
                            I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                        </label>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fas fa-user-plus"></i>
                        Join Relief Network
                    </button>
                </form>
            </div>

            <div class="footer-info">
                <p><i class="fas fa-info-circle"></i> Connecting communities for effective disaster relief and sustainable development</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
